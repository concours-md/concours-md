<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Concours.md - Forgot Password</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <h1>Concours<span>.md</span></h1>
        <p>Reset your password</p>
      </div>

      <form id="forgotForm">
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input type="email" id="email" class="form-input" placeholder="your@email.com" required>
        </div>

        <div id="errorMsg" class="hidden" style="color: var(--danger); margin-bottom: 16px; font-size: 0.9rem;"></div>
        <div id="successMsg" class="hidden" style="color: var(--success); margin-bottom: 16px; font-size: 0.9rem;"></div>

        <button type="submit" class="btn btn-primary btn-block">Send Reset Link</button>
      </form>

      <div class="auth-footer">
        <p>Remember your password? <a href="index.html">Log in</a></p>
      </div>
    </div>
  </div>

  <script type="module">
    import { sendPasswordReset } from './auth.js';

    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const errorMsg = document.getElementById('errorMsg');
      const successMsg = document.getElementById('successMsg');

      try {
        errorMsg.classList.add('hidden');
        successMsg.classList.add('hidden');
        await sendPasswordReset(email);
        successMsg.textContent = 'Check your email for a reset link.';
        successMsg.classList.remove('hidden');
      } catch (err) {
        errorMsg.textContent = err.message || 'Failed to send reset link.';
        errorMsg.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
