<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Concours.md - Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <h1>Concours<span>.md</span></h1>
        <p>Lebanese University CSVT QBank</p>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input type="email" id="email" class="form-input" placeholder="your@email.com" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input type="password" id="password" class="form-input" placeholder="••••••••" required>
        </div>

        <div id="errorMsg" class="hidden" style="color: var(--danger); margin-bottom: 16px; font-size: 0.9rem;"></div>

        <button type="submit" class="btn btn-primary btn-block">Log In</button>
      </form>

      <div class="auth-footer">
        <p><a href="forgot-password.html">Forgot password?</a></p>
        <p class="mt-2">Don't have an account? <a href="signup.html">Sign up</a></p>
      </div>
    </div>
  </div>

  <script type="module">
    import { logIn, getCurrentUser } from './auth.js';

    // Redirect if already logged in
    getCurrentUser().then(user => {
      if (user) window.location.href = 'dashboard.html';
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');

      try {
        errorMsg.classList.add('hidden');
        await logIn(email, password);
        window.location.href = 'dashboard.html';
      } catch (err) {
        errorMsg.textContent = err.message || 'Invalid email or password';
        errorMsg.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
