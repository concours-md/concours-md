<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Concours.md - Test</title>
  <link rel="stylesheet" href="style.css">
  <script>
    window.MathJax = {
      tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
      svg: { fontCache: 'global' }
    };
  </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <style>
    .test-body { background: #f0f2f5; }
    .test-navigator { 
      position: sticky; 
      bottom: 0; 
      background: var(--bg-secondary);
      padding: 16px;
      border-radius: 12px;
      margin-top: 20px;
      box-shadow: var(--shadow);
    }
    .nav-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .nav-box {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      border: 2px solid var(--border-color);
      background: var(--white);
      transition: all 0.2s;
      position: relative;
    }
    .nav-box:hover { transform: scale(1.1); }
    .nav-box.current { border-color: var(--phys-blue); box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.3); }
    .nav-box.answered { background: var(--success); color: white; border-color: var(--success); }
    .nav-box.marked::after { content: '🚩'; position: absolute; top: -8px; right: -8px; font-size: 14px; }
    .nav-box.marked { border-color: var(--warning); }
    .nav-box.answered.marked { background: var(--success); }
    .nav-box.answered.marked::after { content: '🚩'; position: absolute; top: -8px; right: -8px; }
    
    .equation { font-family: 'Times New Roman', serif; font-style: italic; }
    
    .choice-correct { background: rgba(39, 174, 96, 0.15) !important; border-color: var(--success) !important; }
    .choice-incorrect { background: rgba(231, 76, 60, 0.15) !important; border-color: var(--danger) !important; }
    
    .test-header {
      background: var(--bg-secondary);
      padding: 16px 0;
      position: sticky;
      top: 57px;
      z-index: 50;
      box-shadow: var(--shadow);
    }
  </style>
</head>
<body class="test-body">
  <!-- Test Header -->
  <div class="test-header">
    <div class="container" style="max-width: 1000px; display: flex; justify-content: space-between; align-items: center;">
      <div>
        <strong id="testTitle">Test</strong>
        <span id="questionCounter" style="margin-left: 15px; color: var(--text-secondary);">1 / 25</span>
      </div>
      <div style="display: flex; gap: 15px; align-items: center;">
        <span id="markedBadge" class="badge badge-warning hidden">★ Marked</span>
        <span id="timer" class="timer">45:00</span>
      </div>
    </div>
  </div>

  <!-- Main Test Area -->
  <div class="container" style="max-width: 1000px; padding-top: 20px;">
    
    <!-- Question Card -->
    <div class="question-card" id="questionCard">
      <div class="question-number" id="questionNum">Question 1</div>
      <div class="question-stem" id="questionStem">Loading question...</div>
      <div id="answerChoices"></div>
    </div>

    <!-- Action Buttons -->
    <div style="display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap;">
      <button class="btn btn-outline btn-sm" id="markBtn">★ Mark</button>
      <button class="btn btn-outline btn-sm" id="strikeBtn">⟶ Strikethrough</button>
      <button class="btn btn-outline btn-sm" id="prevBtn">← Previous</button>
      <button class="btn btn-primary btn-sm" id="nextBtn">Next →</button>
      <button class="btn btn-danger btn-sm" id="suspendBtn" style="margin-left: auto;">Suspend</button>
      <button class="btn btn-concours btn-sm" id="submitBtn">Submit</button>
    </div>

    <!-- Question Navigator -->
    <div class="question-navigator test-navigator">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
        <strong>Question Navigator</strong>
        <div style="display: flex; gap: 12px; font-size: 0.8rem;">
          <span><span style="display:inline-block;width:12px;height:12px;background:var(--success);border-radius:3px;margin-right:4px;"></span>Correct</span>
          <span><span style="display:inline-block;width:12px;height:12px;background:var(--danger);border-radius:3px;margin-right:4px;"></span>Wrong</span>
          <span><span style="display:inline-block;width:12px;height:12px;background:var(--warning);border-radius:3px;margin-right:4px;"></span>Marked</span>
        </div>
      </div>
      <div class="nav-grid" id="questionNav"></div>
    </div>

  </div>

  <!-- Submit Confirmation Modal -->
  <div id="submitModal" class="hidden" style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000;">
    <div class="card" style="max-width: 400px; width: 90%;">
      <h3 class="mb-2">Submit Test?</h3>
      <p class="text-secondary mb-2" id="submitSummary">You have answered X of Y questions.</p>
      <p class="text-secondary mb-3" id="markedSummary"></p>
      <div style="display: flex; gap: 10px;">
        <button class="btn btn-outline" id="cancelSubmit">Cancel</button>
        <button class="btn btn-concours" id="confirmSubmit">Confirm Submit</button>
      </div>
    </div>
  </div>

  <!-- Results Page (hidden initially) -->
  <div id="resultsPage" class="hidden">
    <div class="container" style="max-width: 900px; padding-top: 30px;">
      <h1 class="mb-3">Test Results</h1>
      <div class="card text-center mb-3">
        <div class="score-circle" id="scoreCircle">0%</div>
        <h2 id="scoreText">Score</h2>
        <div class="stats-grid mt-3">
          <div class="stat-box">
            <div class="stat-value" id="correctCount" style="color: var(--success);">0</div>
            <div class="stat-label">Correct</div>
          </div>
          <div class="stat-box">
            <div class="stat-value" id="incorrectCount" style="color: var(--danger);">0</div>
            <div class="stat-label">Incorrect</div>
          </div>
          <div class="stat-box">
            <div class="stat-value" id="omittedCount" style="color: var(--text-secondary);">0</div>
            <div class="stat-label">Omitted</div>
          </div>
        </div>
        <p class="text-secondary mt-2" id="timeSummary"></p>
      </div>

      <div class="card">
        <h3 class="mb-3">Question Review</h3>
        <div id="reviewList"></div>
      </div>

      <div style="display: flex; gap: 10px; margin-top: 20px;">
        <button class="btn btn-primary" id="backToDashboard">Back to Dashboard</button>
        <button class="btn btn-outline" id="reviewIncorrect">Review Incorrect</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { getCurrentUser, getUserLanguage } from './auth.js';
    import { databases, DB_ID, COLLECTIONS, Query, ID } from './appwrite.js';

    let testConfig = null;
    let questions = [];
    let currentIndex = 0;
    let answers = {};
    let markedQuestions = new Set();
    let timeRemaining = 0;
    let timerInterval = null;
    let questionTimes = {};
    let questionStartTime = Date.now();
    let testStartTime = Date.now();
    let isSubmitted = false;
    let currentLang = 'en';

    const translations = {
      en: {
        question: 'Question', of: 'of', marked: '★ Marked', mark: 'Mark', markedDone: '★ Marked',
        previous: 'Previous', next: 'Next', suspend: 'Suspend', submit: 'Submit',
        submitTitle: 'Submit Test?', submitSummary: 'You have answered {x} of {y} questions.',
        markedSummary: '{n} questions are marked for review.',
        cancel: 'Cancel', confirm: 'Confirm Submit',
        correct: 'Correct', incorrect: 'Incorrect', omitted: 'Omitted',
        yourAnswer: 'Your Answer', correctAnswer: 'Correct Answer', rationale: 'Rationale',
        timeUsed: 'Time Used', review: 'Review Question', back: 'Back to Dashboard', reviewIncorrect: 'Review Incorrect',
        suspendMsg: 'Test suspended. Your progress has been saved.',
        noQuestions: 'No questions available for this test.',
        errorLoading: 'Error loading questions: '
      },
      fr: {
        question: 'Question', of: 'sur', marked: '★ Marqué', mark: 'Marquer', markedDone: '★ Marqué',
        previous: 'Précédent', next: 'Suivant', suspend: 'Suspendre', submit: 'Soumettre',
        submitSummary: 'Vous avez répondu à {x} questions sur {y}.',
        cancel: 'Annuler', confirm: 'Confirmer',
        correct: 'Correct', incorrect: 'Incorrect', omitted: 'Omis',
        yourAnswer: 'Votre Réponse', correctAnswer: 'Bonne Réponse', rationale: 'Raisonnement',
        timeUsed: 'Temps Utilisé', back: 'Retour au Tableau', reviewIncorrect: 'Revoir les Incorrectes',
        suspendMsg: 'Test suspendu. Votre progression a été sauvegardée.',
        noQuestions: 'Aucune question disponible pour ce test.',
        errorLoading: 'Erreur de chargement : '
      }
    };

    function t(key) { return translations[currentLang]?.[key] || translations.en[key] || key; }

    async function init() {
      const user = await getCurrentUser();
      if (!user) { window.location.href = 'login.html'; return; }

      currentLang = await getUserLanguage();

      const configStr = sessionStorage.getItem('testConfig');
      if (!configStr) { window.location.href = 'dashboard.html'; return; }

      testConfig = JSON.parse(configStr);
      
      if (testConfig.type === 'concours') {
        timeRemaining = testConfig.duration * 60;
      } else {
        timeRemaining = (testConfig.numQuestions || 25) * 90;
      }

      setupEventListeners();
      await loadQuestions();
    }

    function setupEventListeners() {
      document.getElementById('markBtn').addEventListener('click', toggleMark);
      document.getElementById('strikeBtn').addEventListener('click', strikethroughMode);
      document.getElementById('prevBtn').addEventListener('click', prevQuestion);
      document.getElementById('nextBtn').addEventListener('click', nextQuestion);
      document.getElementById('suspendBtn').addEventListener('click', suspendTest);
      document.getElementById('submitBtn').addEventListener('click', submitTest);
      document.getElementById('cancelSubmit').addEventListener('click', closeModal);
      document.getElementById('confirmSubmit').addEventListener('click', confirmSubmit);
      document.getElementById('backToDashboard').addEventListener('click', () => window.location.href = 'dashboard.html');
      document.getElementById('reviewIncorrect').addEventListener('click', reviewIncorrect);
    }

    async function loadQuestions() {
      try {
        let allQuestions = [];

        if (testConfig.type === 'concours') {
          for (const course of testConfig.courses) {
            try {
              const result = await databases.listDocuments(DB_ID, COLLECTIONS.QUESTIONS, [
                Query.equal('category', testConfig.category),
                Query.limit(course.count)
              ]);
              allQuestions = allQuestions.concat(result.documents);
            } catch (e) { console.warn('Could not load course questions:', e); }
          }
        } else {
          const result = await databases.listDocuments(DB_ID, COLLECTIONS.QUESTIONS, [
            Query.equal('category', testConfig.category),
            Query.limit(testConfig.numQuestions || 25)
          ]);
          allQuestions = result.documents;
        }

        if (allQuestions.length === 0) {
          document.getElementById('questionStem').textContent = t('noQuestions');
          return;
        }

        questions = allQuestions.map(q => ({
          ...q,
          course: safeParse(q.course, {}),
          en: safeParse(q.en, {}),
          fr: safeParse(q.fr, {})
        }));

        shuffleArray(questions);
        renderQuestion();
        renderNavigator();
        startTimer();
      } catch (err) {
        console.error('Failed to load questions:', err);
        document.getElementById('questionStem').textContent = t('errorLoading') + err.message;
      }
    }

    function safeParse(str, defaultVal) {
      try { return JSON.parse(str); } catch { return defaultVal; }
    }

    function shuffleArray(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
    }

    function renderQuestion() {
      const q = questions[currentIndex];
      if (!q) return;

      document.getElementById('questionCounter').textContent = `${currentIndex + 1} / ${questions.length}`;
      document.getElementById('questionNum').textContent = `${t('question')} ${currentIndex + 1}`;

      const markBadge = document.getElementById('markedBadge');
      const markBtn = document.getElementById('markBtn');
      if (markedQuestions.has(currentIndex)) {
        markBadge.classList.remove('hidden');
        markBtn.textContent = t('markedDone');
        markBtn.style.borderColor = 'var(--warning)';
      } else {
        markBadge.classList.add('hidden');
        markBtn.textContent = t('mark');
        markBtn.style.borderColor = '';
      }

      const stem = q[currentLang]?.stem || q.en?.stem || '';
      document.getElementById('questionStem').innerHTML = stem;
      renderMath();

      const choices = q[currentLang]?.choices || q.en?.choices || [];
      const container = document.getElementById('answerChoices');
      const letters = ['A', 'B', 'C', 'D', 'E'];
      const selectedAnswer = answers[q.$id];

      container.innerHTML = choices.map((choice, i) => {
        const letter = letters[i];
        const isSelected = selectedAnswer === letter;
        return `
          <div class="answer-choice ${isSelected ? 'selected' : ''}" data-letter="${letter}">
            <span class="choice-letter">${letter}</span>
            <span class="choice-text">${choice}</span>
          </div>
        `;
      }).join('');

      container.querySelectorAll('.answer-choice').forEach(el => {
        el.addEventListener('click', () => selectAnswer(el.dataset.letter));
        el.addEventListener('dblclick', () => strikethroughChoice(el));
      });

      questionStartTime = Date.now();
    }

    function renderMath() {
      if (window.MathJax && window.MathJax.typesetPromise) {
        window.MathJax.typesetPromise([document.getElementById('questionCard')]).catch(() => {});
      }
    }

    function selectAnswer(letter) {
      const q = questions[currentIndex];
      if (!q) return;

      const timeSpent = Math.round((Date.now() - questionStartTime) / 1000);
      questionTimes[q.$id] = (questionTimes[q.$id] || 0) + timeSpent;

      answers[q.$id] = letter;

      document.querySelectorAll('.answer-choice').forEach(el => {
        el.classList.toggle('selected', el.dataset.letter === letter);
      });

      renderNavigator();
    }

    function strikethroughMode() {
      document.getElementById('strikeBtn').classList.toggle('active');
    }

    function strikethroughChoice(el) {
      el.classList.toggle('strikethrough');
    }

    function nextQuestion() {
      if (currentIndex < questions.length - 1) {
        currentIndex++;
        renderQuestion();
      }
    }

    function prevQuestion() {
      if (currentIndex > 0) {
        currentIndex--;
        renderQuestion();
      }
    }

    function goToQuestion(index) {
      currentIndex = index;
      renderQuestion();
    }

    function toggleMark() {
      if (markedQuestions.has(currentIndex)) {
        markedQuestions.delete(currentIndex);
      } else {
        markedQuestions.add(currentIndex);
      }
      renderQuestion();
      renderNavigator();
    }

    function renderNavigator() {
      const nav = document.getElementById('questionNav');
      nav.innerHTML = questions.map((q, i) => {
        const isAnswered = answers[q.$id] !== undefined;
        const isMarked = markedQuestions.has(i);
        const isCurrent = i === currentIndex;

        let cls = 'nav-box';
        if (isCurrent) cls += ' current';
        if (isAnswered) cls += ' answered';
        if (isMarked) cls += ' marked';

        return `<div class="${cls}" onclick="window.app.goToQuestion(${i})">${i + 1}</div>`;
      }).join('');
    }

    function startTimer() {
      updateTimerDisplay();
      timerInterval = setInterval(() => {
        timeRemaining--;
        updateTimerDisplay();
        if (timeRemaining <= 0) {
          clearInterval(timerInterval);
          if (testConfig.tutorMode === 'off') confirmSubmit();
        }
      }, 1000);
    }

    function updateTimerDisplay() {
      const timer = document.getElementById('timer');
      const hours = Math.floor(Math.abs(timeRemaining) / 3600);
      const minutes = Math.floor((Math.abs(timeRemaining) % 3600) / 60);
      const seconds = Math.abs(timeRemaining) % 60;

      if (timeRemaining < 0) {
        timer.textContent = `-${hours > 0 ? hours + ':' : ''}${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        timer.className = 'timer danger';
      } else if (timeRemaining < 300) {
        timer.textContent = `${hours > 0 ? hours + ':' : ''}${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        timer.className = 'timer warning';
      } else {
        timer.textContent = `${hours > 0 ? hours + ':' : ''}${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        timer.className = 'timer';
      }
    }

    function suspendTest() {
      clearInterval(timerInterval);
      sessionStorage.setItem('suspendedTest', JSON.stringify({
        testConfig, questions, answers, markedQuestions, timeRemaining, questionTimes
      }));
      alert(t('suspendMsg'));
      window.location.href = 'dashboard.html';
    }

    function submitTest() {
      const answered = Object.keys(answers).length;
      const total = questions.length;
      const marked = markedQuestions.size;

      document.getElementById('submitSummary').textContent = t('submitSummary').replace('{x}', answered).replace('{y}', total);
      document.getElementById('markedSummary').textContent = t('markedSummary').replace('{n}', marked);
      document.getElementById('submitModal').classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('submitModal').classList.add('hidden');
    }

    function confirmSubmit() {
      if (isSubmitted) return;
      isSubmitted = true;
      clearInterval(timerInterval);
      showResults();
    }

    function showResults() {
      document.querySelector('.container').classList.add('hidden');
      document.querySelector('.test-header').classList.add('hidden');
      document.getElementById('resultsPage').classList.remove('hidden');

      let correct = 0, incorrect = 0, omitted = 0;

      questions.forEach(q => {
        const userAnswer = answers[q.$id];
        if (!userAnswer) omitted++;
        else if (userAnswer === q.correct) correct++;
        else incorrect++;
      });

      const percentage = Math.round((correct / questions.length) * 100);

      const circle = document.getElementById('scoreCircle');
      circle.textContent = `${percentage}%`;
      circle.className = 'score-circle ' + (percentage >= 70 ? 'excellent' : percentage >= 50 ? 'good' : percentage >= 30 ? 'average' : 'poor');

      document.getElementById('correctCount').textContent = correct;
      document.getElementById('incorrectCount').textContent = incorrect;
      document.getElementById('omittedCount').textContent = omitted;

      const totalTime = Math.round((Date.now() - testStartTime) / 1000);
      const hours = Math.floor(totalTime / 3600);
      const mins = Math.floor((totalTime % 3600) / 60);
      const secs = totalTime % 60;
      document.getElementById('timeSummary').textContent = `${t('timeUsed')}: ${hours > 0 ? hours + 'h ' : ''}${mins}m ${secs}s`;

      const reviewList = document.getElementById('reviewList');
      reviewList.innerHTML = questions.map((q, i) => {
        const userAnswer = answers[q.$id];
        const isCorrect = userAnswer === q.correct;
        const isOmitted = !userAnswer;

        let statusColor = 'var(--text-secondary)';
        let statusText = t('omitted');
        if (userAnswer) {
          if (isCorrect) { statusColor = 'var(--success)'; statusText = t('correct'); }
          else { statusColor = 'var(--danger)'; statusText = t('incorrect'); }
        }

        return `
          <div class="card mb-2" style="cursor: pointer; border-left: 4px solid ${statusColor};" onclick="window.app.toggleReview(${i})">
            <div style="display: flex; justify-content: space-between; align-items: center;">
              <strong>${t('question')} ${i + 1}</strong>
              <span style="color: ${statusColor};">${statusText}</span>
            </div>
            <div id="review-${i}" class="hidden mt-2" style="font-size: 0.9rem;">
              <p><strong>${t('yourAnswer')}:</strong> ${userAnswer || '-'}</p>
              <p><strong>${t('correctAnswer')}:</strong> ${q.correct}</p>
              <p><strong>${t('rationale')}:</strong> ${q[currentLang]?.rationale || q.en?.rationale || '-'}</p>
            </div>
          </div>
        `;
      }).join('');

      saveTestResults(correct, incorrect, omitted, percentage);
    }

    function toggleReview(index) {
      const el = document.getElementById(`review-${index}`);
      el.classList.toggle('hidden');
    }

    function reviewIncorrect() {
      document.querySelectorAll('[id^="review-"]').forEach(el => el.classList.add('hidden'));
      questions.forEach((q, i) => {
        const userAnswer = answers[q.$id];
        if (userAnswer && userAnswer !== q.correct) {
          document.getElementById(`review-${i}`).classList.remove('hidden');
        }
      });
    }

    async function saveTestResults(correct, incorrect, omitted, percentage) {
      try {
        const user = await getCurrentUser();
        await databases.createDocument(DB_ID, COLLECTIONS.TESTS, ID.unique(), {
          userId: user.$id,
          type: testConfig.type,
          category: testConfig.category,
          course: testConfig.course || '',
          questions: JSON.stringify(questions.map(q => q.$id)),
          answers: JSON.stringify(answers),
          score: percentage,
          duration: Math.round((Date.now() - testStartTime) / 1000),
          createdAt: new Date().toISOString()
        });
      } catch (err) {
        console.error('Failed to save test:', err);
      }
    }

    window.app = { goToQuestion, toggleReview };

    init();
  </script>
