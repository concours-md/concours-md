<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Concours.md - Reset Password</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <h1>Concours<span>.md</span></h1>
        <p>Set a new password</p>
      </div>

      <form id="resetForm">
        <div class="form-group">
          <label class="form-label" for="password">New Password</label>
          <input type="password" id="password" class="form-input" placeholder="Min 8 characters" minlength="8" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" class="form-input" placeholder="Repeat password" minlength="8" required>
        </div>

        <div id="errorMsg" class="hidden" style="color: var(--danger); margin-bottom: 16px; font-size: 0.9rem;"></div>
        <div id="successMsg" class="hidden" style="color: var(--success); margin-bottom: 16px; font-size: 0.9rem;"></div>

        <button type="submit" class="btn btn-primary btn-block">Reset Password</button>
      </form>

      <div class="auth-footer">
        <p><a href="index.html">Back to login</a></p>
      </div>
    </div>
  </div>

  <script type="module">
    import { confirmPasswordReset } from './auth.js';

    // Get URL params
    const params = new URLSearchParams(window.location.search);
    const userId = params.get('userId');
    const secret = params.get('secret');

    if (!userId || !secret) {
      document.getElementById('errorMsg').textContent = 'Invalid reset link. Please request a new one.';
      document.getElementById('errorMsg').classList.remove('hidden');
    }

    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const errorMsg = document.getElementById('errorMsg');
      const successMsg = document.getElementById('successMsg');

      if (password !== confirmPassword) {
        errorMsg.textContent = 'Passwords do not match.';
        errorMsg.classList.remove('hidden');
        return;
      }

      try {
        errorMsg.classList.add('hidden');
        successMsg.classList.add('hidden');
        await confirmPasswordReset(userId, secret, password);
        successMsg.textContent = 'Password reset successful! Redirecting to login...';
        successMsg.classList.remove('hidden');
        setTimeout(() => window.location.href = 'index.html', 2000);
      } catch (err) {
        errorMsg.textContent = err.message || 'Failed to reset password.';
        errorMsg.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
