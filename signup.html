<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Concours.md - Sign Up</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <h1>Concours<span>.md</span></h1>
        <p>Create your account</p>
      </div>

      <form id="signupForm">
        <div class="form-group">
          <label class="form-label" for="name">Full Name</label>
          <input type="text" id="name" class="form-input" placeholder="Your full name" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input type="email" id="email" class="form-input" placeholder="your@email.com" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input type="password" id="password" class="form-input" placeholder="Min 8 characters" minlength="8" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="language">Preferred Language</label>
          <select id="language" class="form-select" required>
            <option value="">Select language...</option>
            <option value="fr">Français</option>
            <option value="en">English</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" for="concoursType">Concours Type</label>
          <select id="concoursType" class="form-select" required>
            <option value="">Select your Concours...</option>
            <option value="med">Concours de Médecine Générale et Médecine Dentaire</option>
            <option value="pharma">Concours de Pharmacie</option>
          </select>
          <p style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 5px;">This cannot be changed later</p>
        </div>

        <div id="errorMsg" class="hidden" style="color: var(--danger); margin-bottom: 16px; font-size: 0.9rem;"></div>

        <button type="submit" class="btn btn-primary btn-block">Create Account</button>
      </form>

      <div class="auth-footer">
        <p>Already have an account? <a href="login.html">Log in</a></p>
        <p class="mt-2"><a href="privacy.html">Privacy Policy</a> · <a href="terms.html">Terms of Service</a></p>
        <p class="mt-2"><a href="landing.html">← Back to homepage</a></p>
      </div>
    </div>
  </div>

  <script type="module">
    import { signUp, getCurrentUser } from './auth.js';

    // Redirect if already logged in
    getCurrentUser().then(user => {
      if (user) window.location.href = 'dashboard.html';
    });

    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const language = document.getElementById('language').value;
      const concoursType = document.getElementById('concoursType').value;
      const errorMsg = document.getElementById('errorMsg');

      try {
        errorMsg.classList.add('hidden');
        await signUp(name, email, password, { language, concoursType });
        window.location.href = 'dashboard.html';
      } catch (err) {
        errorMsg.textContent = err.message || 'Sign up failed. Please try again.';
        errorMsg.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
